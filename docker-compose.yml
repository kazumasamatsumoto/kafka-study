version: '3.8'

# 最新版Kafka構成 with UI
# 本番環境のトピック構成を再現
# 使い方: docker compose -f docker-compose.modern.yml up -d

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: kafka-zookeeper-modern
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-broker-modern
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"    # 外部接続用
      - "19092:19092"  # ホストからの接続用（本番構成維持）
    environment:
      # Broker設定
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # リスナー設定（2つのリスナー）
      # INTERNAL: Docker内部通信用
      # HOST: ホスト（ローカルマシン）からの接続用
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,HOST://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Topic設定
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"  # 修正: ture → true

      # レプリケーション設定（単一ブローカーなので1）
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1

      # パフォーマンス設定
      KAFKA_NUM_NETWORK_THREADS: 3
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600

      # ログ設定
      KAFKA_LOG_RETENTION_HOURS: 168  # 7日間保持
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000

      # グループコーディネーター設定
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # JVM設定
      KAFKA_HEAP_OPTS: "-Xmx1G -Xms1G"
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # トピック初期化コンテナ
  kafka-init-topics:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init-topics
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
    command: >
      bash -c "
      echo '===================================';
      echo 'Waiting for Kafka to be ready...';
      echo '===================================';
      cub kafka-ready -b kafka:9092 1 30;
      echo '===================================';
      echo 'Creating topics...';
      echo '===================================';
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic orders-topic --partitions 1 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic payments-topic --partitions 1 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic notifications-topic --partitions 1 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic events-topic --partitions 1 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic logs-topic --partitions 1 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic health-check-topic --partitions 1 --replication-factor 1;
      echo '===================================';
      echo 'Creating learning topics...';
      echo '===================================';
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic learn-topic --partitions 1 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic partition-topic --partitions 3 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic realtime-topic --partitions 1 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic test-topic --partitions 1 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic demo-topic --partitions 1 --replication-factor 1;
      echo '===================================';
      echo 'Topics created successfully!';
      echo '===================================';
      kafka-topics --list --bootstrap-server kafka:9092;
      echo '===================================';
      echo 'Topic details:';
      echo '===================================';
      kafka-topics --describe --bootstrap-server kafka:9092;
      "

  # Kafka UI（管理画面）
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-modern
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Kafka接続設定
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

      # UI設定
      DYNAMIC_CONFIG_ENABLED: "true"

      # メトリクス設定
      KAFKA_CLUSTERS_0_METRICS_PORT: 9092

      # 認証設定（開発環境なので無効）
      AUTH_TYPE: "DISABLED"

      # ログレベル
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_PROVECTUS: DEBUG
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  kafka-network:
    driver: bridge
    name: kafka-network-modern
